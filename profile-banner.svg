<svg width="100%" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes run { 0%{transform:translateX(940px)} 100%{transform:translateX(-100px)} }
    @keyframes legF { 0%,100%{transform:rotate(-38deg)} 50%{transform:rotate(38deg)} }
    @keyframes legB { 0%,100%{transform:rotate(38deg)} 50%{transform:rotate(-38deg)} }
    @keyframes armF { 0%,100%{transform:rotate(42deg)} 50%{transform:rotate(-42deg)} }
    @keyframes armB { 0%,100%{transform:rotate(-42deg)} 50%{transform:rotate(42deg)} }
    @keyframes bob  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes nameIn  { 0%{opacity:0;letter-spacing:22px} 100%{opacity:1;letter-spacing:5px} }
    @keyframes roleIn  { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:0.85;transform:translateY(0)} }
    @keyframes tagIn   { 0%{opacity:0} 100%{opacity:1} }
    @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes scan    { 0%{transform:translateY(-30px);opacity:0} 8%{opacity:0.9} 92%{opacity:0.5} 100%{transform:translateY(230px);opacity:0} }
    @keyframes gridPulse { 0%,100%{opacity:0.05} 50%{opacity:0.12} }
    @keyframes dash1   { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-80} }
    @keyframes dash2   { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-60} }
    @keyframes float1  { 0%,100%{transform:translateY(0);opacity:0.5} 50%{transform:translateY(-12px);opacity:1} }
    @keyframes float2  { 0%,100%{transform:translateY(0);opacity:0.3} 50%{transform:translateY(-9px);opacity:0.8} }
    @keyframes float3  { 0%,100%{transform:translateY(0);opacity:0.55} 50%{transform:translateY(-7px);opacity:0.9} }
    @keyframes pkUp1   { 0%{transform:translateY(0);opacity:0.4} 100%{transform:translateY(-210px);opacity:0} }
    @keyframes pkUp2   { 0%{transform:translateY(0);opacity:0.3} 100%{transform:translateY(-170px);opacity:0} }
    @keyframes corner  { 0%,100%{opacity:0.4} 50%{opacity:0.75} }
    @keyframes gnd     { 0%,100%{opacity:0.15} 50%{opacity:0.4} }
    @keyframes shadowB { 0%,100%{transform:scaleX(1);opacity:0.12} 50%{transform:scaleX(0.7);opacity:0.05} }
    @keyframes dotOrbit { 0%{transform:rotate(0deg) translateX(28px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(28px) rotate(-360deg)} }
    @keyframes dotOrbit2 { 0%{transform:rotate(120deg) translateX(28px) rotate(-120deg)} 100%{transform:rotate(480deg) translateX(28px) rotate(-480deg)} }
    @keyframes dotOrbit3 { 0%{transform:rotate(240deg) translateX(28px) rotate(-240deg)} 100%{transform:rotate(600deg) translateX(28px) rotate(-600deg)} }
    @keyframes ringPulse { 0%,100%{opacity:0.12;r:22} 50%{opacity:0.25;r:25} }

    .runner-group { animation: run 5.5s linear infinite; }
    .body-bob     { animation: bob 0.38s ease-in-out infinite; }
    .leg-f  { transform-origin:0 0; animation: legF 0.38s ease-in-out infinite; }
    .leg-b  { transform-origin:0 0; animation: legB 0.38s ease-in-out infinite; }
    .arm-f  { transform-origin:0 0; animation: armF 0.38s ease-in-out infinite; }
    .arm-b  { transform-origin:0 0; animation: armB 0.38s ease-in-out infinite; }
    .name   { animation: nameIn 1.5s cubic-bezier(0.16,1,0.3,1) 0.3s both; }
    .role   { animation: roleIn 1s ease 1.8s both; }
    .tags   { animation: tagIn 1s ease 2.4s both; }
    .cursor { animation: blink 1s step-end infinite 2s; }
    .scan   { animation: scan 4s linear infinite; }
    .grid   { animation: gridPulse 3s ease-in-out infinite; }
    .c1     { animation: dash1 2.5s linear infinite; }
    .c2     { animation: dash2 3.5s linear infinite; }
    .c3     { animation: dash1 4s linear 1s infinite; }
    .c4     { animation: dash2 3s linear 0.5s infinite; }
    .p1     { animation: float1 3.2s ease-in-out infinite; }
    .p2     { animation: float2 4.1s ease-in-out 0.7s infinite; }
    .p3     { animation: float3 3.7s ease-in-out 1.3s infinite; }
    .p4     { animation: float1 4.5s ease-in-out 0.3s infinite; }
    .p5     { animation: float2 3.4s ease-in-out 1.8s infinite; }
    .pk1    { animation: pkUp1 4.2s ease-in infinite; }
    .pk2    { animation: pkUp2 5.1s ease-in 1.8s infinite; }
    .pk3    { animation: pkUp1 4.7s ease-in 3.2s infinite; }
    .corners{ animation: corner 2.5s ease-in-out infinite; }
    .gnd    { animation: gnd 2.5s ease-in-out infinite; }
    .shadow { animation: shadowB 0.38s ease-in-out infinite; }
    .orb1   { animation: dotOrbit  4s linear infinite; }
    .orb2   { animation: dotOrbit2 4s linear infinite; }
    .orb3   { animation: dotOrbit3 4s linear infinite; }
    .ring   { animation: ringPulse 2.5s ease-in-out infinite; }
  </style>
  <clipPath id="cl"><rect width="860" height="200" rx="12"/></clipPath>
  <filter id="b2"><feGaussianBlur stdDeviation="2"/></filter>
</defs>

<g clip-path="url(#cl)">

  <!-- BACKGROUND -->
  <rect width="860" height="200" fill="#04080f" rx="12"/>
  <rect width="860" height="200" fill="#060e1c" opacity="0.8"/>

  <!-- GRID -->
  <g class="grid" stroke="#00e5ff" stroke-width="0.4">
    <line x1="0" y1="40"  x2="860" y2="40"/>
    <line x1="0" y1="80"  x2="860" y2="80"/>
    <line x1="0" y1="120" x2="860" y2="120"/>
    <line x1="0" y1="160" x2="860" y2="160"/>
    <line x1="43"  y1="0" x2="43"  y2="200"/>
    <line x1="86"  y1="0" x2="86"  y2="200"/>
    <line x1="172" y1="0" x2="172" y2="200"/>
    <line x1="258" y1="0" x2="258" y2="200"/>
    <line x1="344" y1="0" x2="344" y2="200"/>
    <line x1="430" y1="0" x2="430" y2="200"/>
    <line x1="516" y1="0" x2="516" y2="200"/>
    <line x1="602" y1="0" x2="602" y2="200"/>
    <line x1="688" y1="0" x2="688" y2="200"/>
    <line x1="774" y1="0" x2="774" y2="200"/>
    <line x1="817" y1="0" x2="817" y2="200"/>
  </g>

  <!-- CIRCUIT TRACES -->
  <g fill="none" stroke-linecap="round">
    <polyline class="c1" points="0,48 90,48 90,78 145,78"  stroke="#00e5ff" stroke-width="0.9" opacity="0.16" stroke-dasharray="5,7"/>
    <polyline class="c2" points="0,138 65,138 65,108 118,108" stroke="#00e5ff" stroke-width="0.9" opacity="0.13" stroke-dasharray="4,8"/>
    <polyline class="c3" points="860,65 768,65 768,95 710,95"  stroke="#c084fc" stroke-width="0.9" opacity="0.16" stroke-dasharray="5,7"/>
    <polyline class="c4" points="860,148 782,148 782,122 724,122" stroke="#c084fc" stroke-width="0.9" opacity="0.13" stroke-dasharray="4,6"/>
    <polyline class="c1" points="230,0 230,32 268,32" stroke="#00e5ff" stroke-width="0.9" opacity="0.11" stroke-dasharray="4,7"/>
    <polyline class="c2" points="580,200 580,178 548,178" stroke="#c084fc" stroke-width="0.9" opacity="0.11" stroke-dasharray="4,7"/>
  </g>
  <g fill="#00e5ff" opacity="0.28">
    <circle cx="145" cy="78"  r="2.2"/>
    <circle cx="118" cy="108" r="2.2"/>
    <circle cx="268" cy="32"  r="1.8"/>
  </g>
  <g fill="#c084fc" opacity="0.28">
    <circle cx="710" cy="95"  r="2.2"/>
    <circle cx="724" cy="122" r="2.2"/>
    <circle cx="548" cy="178" r="1.8"/>
  </g>

  <!-- SCAN LINE -->
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect class="scan" x="0" y="0" width="860" height="26" fill="url(#sg)" opacity="0.06"/>

  <!-- FLOATING PARTICLES -->
  <circle class="p1" cx="45"  cy="50"  r="1.7" fill="#00e5ff"/>
  <circle class="p2" cx="105" cy="158" r="1.3" fill="#00e5ff"/>
  <circle class="p3" cx="185" cy="28"  r="1.9" fill="#c084fc"/>
  <circle class="p4" cx="716" cy="45"  r="1.7" fill="#00e5ff"/>
  <circle class="p5" cx="798" cy="132" r="1.3" fill="#c084fc"/>
  <circle class="p1" cx="375" cy="16"  r="1.2" fill="#c084fc"/>
  <circle class="p3" cx="818" cy="78"  r="1.4" fill="#00e5ff"/>
  <circle class="p2" cx="28"  cy="105" r="1.2" fill="#c084fc"/>
  <circle class="p4" cx="650" cy="170" r="1.6" fill="#00e5ff"/>

  <!-- DATA PACKETS -->
  <g class="pk1" transform="translate(310,195)">
    <rect x="0" y="0" width="6" height="6" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>
    <rect x="2" y="2" width="2" height="2" fill="#c084fc" opacity="0.3"/>
  </g>
  <g class="pk2" transform="translate(535,205)">
    <rect x="0" y="0" width="5" height="5" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.4"/>
    <rect x="1.5" y="1.5" width="2" height="2" fill="#00e5ff" opacity="0.25"/>
  </g>
  <g class="pk3" transform="translate(145,208)">
    <rect x="0" y="0" width="7" height="7" fill="none" stroke="#c084fc" stroke-width="0.8" opacity="0.4"/>
    <rect x="2" y="2" width="3" height="3" fill="#c084fc" opacity="0.2"/>
  </g>

  <!-- GROUND LINE -->
  <line class="gnd" x1="0" y1="176" x2="860" y2="176" stroke="#00e5ff" stroke-width="0.9" stroke-dasharray="7,5"/>

  <!-- CORNER BRACKETS -->
  <g class="corners" stroke="#00e5ff" stroke-width="1.5" fill="none" stroke-linecap="round">
    <polyline points="10,28 10,10 28,10"/>
    <polyline points="850,28 850,10 832,10"/>
    <polyline points="10,172 10,190 28,190"/>
    <polyline points="850,172 850,190 832,190"/>
  </g>
  <g fill="#00e5ff" opacity="0.35">
    <circle cx="10"  cy="10"  r="1.8"/>
    <circle cx="850" cy="10"  r="1.8"/>
    <circle cx="10"  cy="190" r="1.8"/>
    <circle cx="850" cy="190" r="1.8"/>
  </g>

  <!-- NAME -->
  <text class="name"
    x="430" y="78"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="36"
    font-weight="700"
    fill="#00e5ff"
    letter-spacing="5"
    opacity="0">SANARA PERERA</text>

  <!-- name glow layer -->
  <text class="name"
    x="432" y="80"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="36"
    font-weight="700"
    fill="#00e5ff"
    letter-spacing="5"
    opacity="0.08"
    filter="url(#b2)">SANARA PERERA</text>

  <!-- BLINKING CURSOR -->
  <text class="cursor"
    x="648" y="78"
    font-family="'Courier New',Courier,monospace"
    font-size="36"
    font-weight="700"
    fill="#c084fc">_</text>

  <!-- ROLE -->
  <text class="role"
    x="430" y="108"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="12"
    fill="#80deea"
    letter-spacing="2.5"
    opacity="0">CS Undergraduate  ·  Developer  ·  Explorer</text>

  <!-- TAGS -->
  <g class="tags" opacity="0">
    <!-- Java tag -->
    <rect x="248" y="124" width="52" height="18" rx="9" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.35"/>
    <text x="274" y="136" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#80deea">Java</text>
    <!-- Python tag -->
    <rect x="308" y="124" width="58" height="18" rx="9" fill="none" stroke="#c084fc" stroke-width="0.7" opacity="0.35"/>
    <text x="337" y="136" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#d8b4fe">Python</text>
    <!-- React tag -->
    <rect x="374" y="124" width="52" height="18" rx="9" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.35"/>
    <text x="400" y="136" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#80deea">React</text>
    <!-- AI ML tag -->
    <rect x="434" y="124" width="96" height="18" rx="9" fill="none" stroke="#c084fc" stroke-width="0.7" opacity="0.35"/>
    <text x="482" y="136" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#d8b4fe">AI Enthusiast</text>
    <!-- Open Source tag -->
    <rect x="538" y="124" width="78" height="18" rx="9" fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.35"/>
    <text x="577" y="136" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#80deea">Open Source</text>
  </g>

  <!-- RUNNING FIGURE -->
  <g class="runner-group">
    <g transform="translate(0,143)">
      <ellipse class="shadow" cx="0" cy="30" rx="12" ry="3" fill="#00e5ff"/>
      <g class="body-bob">
        <g class="arm-b" style="transform-origin:0px -18px">
          <line x1="0" y1="-18" x2="11" y2="-5" stroke="#00bcd4" stroke-width="2.1" stroke-linecap="round"/>
        </g>
        <g class="leg-b" style="transform-origin:0px 0px">
          <line x1="0"  y1="0"  x2="-9" y2="15" stroke="#00bcd4" stroke-width="2.1" stroke-linecap="round"/>
          <line x1="-9" y1="15" x2="-5" y2="27" stroke="#00bcd4" stroke-width="2.1" stroke-linecap="round"/>
        </g>
        <line x1="0" y1="-26" x2="0" y2="0" stroke="#00e5ff" stroke-width="2.6" stroke-linecap="round"/>
        <circle cx="0" cy="-33" r="7.5" fill="none" stroke="#00e5ff" stroke-width="2.3"/>
        <g class="leg-f" style="transform-origin:0px 0px">
          <line x1="0" y1="0"  x2="9"  y2="15" stroke="#00e5ff" stroke-width="2.1" stroke-linecap="round"/>
          <line x1="9" y1="15" x2="13" y2="27" stroke="#00e5ff" stroke-width="2.1" stroke-linecap="round"/>
        </g>
        <g class="arm-f" style="transform-origin:0px -18px">
          <line x1="0" y1="-18" x2="-11" y2="-5" stroke="#00e5ff" stroke-width="2.1" stroke-linecap="round"/>
        </g>
      </g>
    </g>
  </g>

  <!-- BORDER -->
  <rect width="860" height="200" rx="12" fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.16"/>

</g>
</svg>
